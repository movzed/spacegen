<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpaceGen</title>
  <script type="importmap">
  {
    "imports": {
      "three": "../../node_modules/three/build/three.module.js",
      "lil-gui": "../../node_modules/lil-gui/dist/lil-gui.esm.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    .lil-gui {
      --background-color: #0d0d1a;
      --text-color: #c8c8ff;
      --title-background-color: #080814;
      --widget-color: #1e1e3a;
      --hover-color: #2a2a55;
      --focus-color: #4444cc;
      --number-color: #7799ff;
      --string-color: #77ffaa;
      position: fixed !important;
      right: 0; top: 0;
      height: 100vh;
      overflow-y: auto;
      min-width: 300px;
      max-width: 360px;
      z-index: 10;
    }
    #hud {
      position: fixed;
      bottom: 12px; left: 12px;
      color: #44ff88;
      font-size: 11px;
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="hud">SpaceGen v0.1 — <span id="fps">0</span> fps | <span id="bpm-display">120</span> BPM</div>
  <script type="module" src="app.js"></script>
</body>
</html>
